<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamSystem — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; }
    .logo p  { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: .65rem .85rem; border: 1.5px solid #d1d5db;
      border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #4f46e5; }
    input.error { border-color: #ef4444; }
    .field { margin-bottom: 1.2rem; }
    .field-error { font-size: .78rem; color: #ef4444; margin-top: 4px; display: none; }
    .field-error.visible { display: block; }
    .btn {
      width: 100%; padding: .75rem; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s; margin-top: .5rem;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .alert { padding: .75rem 1rem; border-radius: 8px; font-size: .88rem; margin-bottom: 1.2rem; display: none; }
    .alert.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; display: block; }
    .alert.success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; display: block; }

    /* Forgot Password Link styling */
    .forgot-link {
      display: block; text-align: right; font-size: 0.8rem; 
      color: #4f46e5; text-decoration: none; margin-top: -0.5rem; margin-bottom: 1.2rem;
      font-weight: 500; cursor: pointer;
    }
    .forgot-link:hover { text-decoration: underline; }
    
    /* Recovery Section Panel */
    #recovery-section { display: none; margin-top: 1.5rem; border-top: 1px solid #e5e7eb; padding-top: 1.5rem; }
    .back-btn {
      background: none; border: none; color: #6b7280; font-size: 0.85rem; 
      cursor: pointer; display: block; margin: 1rem auto 0 auto; text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>ExamSystem</h1>
      <p>Internal Examination Management</p>
    </div>
    <div id="alertEl" class="alert" role="alert"></div>

    <!-- MAIN LOGIN FORM -->
    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter your username">
        <span class="field-error" id="username-error">Username is required.</span>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password">
        <span class="field-error" id="password-error">Password is required.</span>
      </div>

      <!-- Forgot password link -->
      <a class="forgot-link" id="toggle-recovery">Forgot password?</a>

      <button class="btn" type="submit" id="submit-btn">Sign in</button>
    </form>

    <!-- PASSWORD RECOVERY FORM (via Phone SMS) -->
    <div id="recovery-section">
      <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: #1a1a2e; text-align: center;">Reset Password via SMS</h3>
      
      <!-- Step 1: Enter phone to request OTP -->
      <form id="request-otp-form">
        <div class="field">
          <label for="recovery-phone">Phone Number</label>
          <input type="text" id="recovery-phone" placeholder="e.g. +254700000000">
        </div>
        <button class="btn" type="submit" id="send-otp-btn">Send OTP Code</button>
      </form>

      <!-- Step 2: Enter code & new password -->
      <form id="verify-otp-form" style="display: none; margin-top: 1.5rem;">
        <div class="field">
          <label for="otp-code">6-Digit OTP Code</label>
          <input type="text" id="otp-code" placeholder="Enter OTP">
        </div>
        <div class="field">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="Enter new password">
        </div>
        <button class="btn" type="submit" id="reset-pass-btn">Update Password</button>
      </form>

      <button class="back-btn" id="back-to-login">Back to Sign In</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already logged in, skip to the right dashboard
    (async () => {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) {
        const { data: profile } = await _sb.from('profiles').select('role').eq('id', session.user.id).single();
        if (profile) {
          window.location.href = profile.role === 'admin' ? 'audit_dashboard.html' : 'teacher_dashboard.html';
        }
      }
    })();

    // UI Navigation triggers
    const loginForm = document.getElementById('login-form');
    const recoverySection = document.getElementById('recovery-section');
    const toggleRecoveryBtn = document.getElementById('toggle-recovery');
    const backToLoginBtn = document.getElementById('back-to-login');
    const alertEl = document.getElementById('alertEl');
    const btn     = document.getElementById('submit-btn');

    // Switch to Recovery screen
    toggleRecoveryBtn.addEventListener('click', () => {
      loginForm.style.display = 'none';
      recoverySection.style.display = 'block';
      alertEl.className = 'alert'; // Clear alerts
    });

    // Switch back to Login screen
    backToLoginBtn.addEventListener('click', () => {
      recoverySection.style.display = 'none';
      loginForm.style.display = 'block';
      alertEl.className = 'alert'; // Clear alerts
    });

    function setFieldError(fieldId, errorId, show) {
      document.getElementById(fieldId).classList.toggle('error', show);
      document.getElementById(errorId).classList.toggle('visible', show);
    }
    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className   = 'alert ' + type;
    }

    // --- SUBMIT LOGIN ---
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      let valid = true;
      if (!username) { setFieldError('username', 'username-error', true);  valid = false; }
      else            { setFieldError('username', 'username-error', false); }
      if (!password)  { setFieldError('password', 'password-error', true);  valid = false; }
      else            { setFieldError('password', 'password-error', false); }
      if (!valid) return;

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      alertEl.className = 'alert';

      // Accounts are stored as username@examsystem.local in Supabase Auth
      const email = `${username.toLowerCase()}@examsystem.local`;

      try {
        const { data, error } = await _sb.auth.signInWithPassword({ email, password });

        if (error || !data.session) {
          // FORENSIC AUDIT: Log only 'FAILED_LOGIN' action to guarantee database compatibility
          await _sb.from('forensic_audit_log').insert({ 
            action_taken: 'FAILED_LOGIN' 
          });

          showAlert('Invalid username or password.', 'error');
          return;
        }

        // Fetch role from profiles table
        const { data: profile } = await _sb
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();

        // Log the successful login event
        await _sb.from('forensic_audit_log').insert({ 
          action_taken: 'LOGIN' 
        });

        showAlert('Login successful. Redirecting…', 'success');
        setTimeout(() => {
          window.location.href = profile?.role === 'admin'
            ? 'audit_dashboard.html'
            : 'teacher_dashboard.html';
        }, 600);

      } catch (err) {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    });

    // --- RECOVERY PROCESS ---
    const requestOtpForm = document.getElementById('request-otp-form');
    const verifyOtpForm  = document.getElementById('verify-otp-form');
    let targetPhone = "";

    // 1. Send OTP Request
    requestOtpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      targetPhone = document.getElementById('recovery-phone').value.trim();
      if (!targetPhone) {
        showAlert('Please enter your phone number.', 'error');
        return;
      }

      const sendBtn = document.getElementById('send-otp-btn');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      // Request OTP code via SMS for the user
      const { error } = await _sb.auth.signInWithOtp({ phone: targetPhone });

      if (error) {
        showAlert('Failed to send code: ' + error.message, 'error');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send OTP Code';
      } else {
        showAlert('Verification code sent to ' + targetPhone, 'success');
        requestOtpForm.style.display = 'none';
        verifyOtpForm.style.display = 'block';
      }
    });

    // 2. Verify OTP and change password
    verifyOtpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('otp-code').value.trim();
      const newPassword = document.getElementById('new-password').value;

      if (!code || !newPassword) {
        showAlert('All fields are required.', 'error');
        return;
      }

      const resetBtn = document.getElementById('reset-pass-btn');
      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating...';

      // Verify the OTP code
      const { data, error } = await _sb.auth.verifyOtp({
        phone: targetPhone,
        token: code,
        type: 'sms'
      });

      if (error) {
        showAlert('Verification failed: ' + error.message, 'error');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      // If OTP verified successfully, update user password
      const { error: updateError } = await _sb.auth.updateUser({
        password: newPassword
      });

      if (updateError) {
        showAlert('Error resetting password: ' + updateError.message, 'error');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
      } else {
        // Successful password update log
        await _sb.from('forensic_audit_log').insert({ 
          action_taken: 'PASSWORD_RESET'
        });

        showAlert('Password reset successfully! Logging you in...', 'success');
        
        // Redirect user after short delay
        setTimeout(() => {
          window.location.href = 'teacher_dashboard.html';
        }, 1500);
      }
    });
  </script>
</body>
</html>
